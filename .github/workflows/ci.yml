# 邻里圈 CI 流水线
# 在 push/PR 到主分支时自动执行 lint、typecheck、test、build
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # 后端质量保障：lint / typecheck / test / build
  server:
    name: Server Lint & Test
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Node.js 20 运行时
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. 安装依赖（npm workspaces 在根目录统一安装）
      - name: Install dependencies
        run: npm ci

      # 4. 代码静态检查（不 lint migrations 目录）
      - name: Run lint
        run: npm run lint --workspace server

      # 5. TypeScript 类型检查
      - name: Run typecheck
        run: npm run typecheck --workspace server

      # 6. 执行单元测试
      - name: Run tests
        run: npm test --workspace server

      # 7. 编译构建产物
      - name: Build
        run: npm run build --workspace server

  # 前端质量保障：lint / test / build，与 server job 对齐
  # 原仅运行 build，缺少 lint 与 test 门禁，无法拦截样式问题与测试回归
  client:
    name: Client Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 代码静态检查，拦截未使用变量、any 逃逸等问题
      - name: Run lint
        run: npm run lint --workspace client

      # 执行单元测试，确保业务逻辑不回归
      - name: Run tests
        run: npm test --workspace client

      # 构建验证（tsc -b 类型检查 + vite build 打包）
      - name: Build
        run: npm run build --workspace client

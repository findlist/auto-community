# 邻里圈 — 一键部署 Docker Compose
# 使用方法：
#   1. 复制 .env.example 为 .env 并填写必填项：
#      JWT_SECRET、DB_PASSWORD、REDIS_PASSWORD、PII_ENCRYPT_KEY、CORS_ORIGIN
#   2. docker compose up -d
#   3. 访问 http://localhost（注意：CORS_ORIGIN 不能使用 localhost，请填写实际访问地址）

services:
  # ==================== PostgreSQL 数据库 ====================
  postgres:
    image: postgres:16-alpine
    container_name: linli-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-linli_circle}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD 必须在 .env 中配置}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-linli_circle}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - linli-network

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: linli-redis
    restart: unless-stopped
    command: redis-server ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - linli-network

  # ==================== 后端 API 服务 ====================
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: linli-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-linli_circle}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD 必须在 .env 中配置}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET 必须在 .env 中配置}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
    ports:
      - "3000:3000"
    networks:
      - linli-network

  # ==================== 前端 Web 服务 ====================
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: linli-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"
    networks:
      - linli-network

volumes:
  postgres_data:
  redis_data:

networks:
  linli-network:
    driver: bridge

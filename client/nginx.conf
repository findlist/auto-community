# 前端 Nginx 配置
# 托管 React 静态资源，并将 API 与 WebSocket 请求反代到后端

server {
    listen 80;
    server_name _;

    # 防止重定向时泄露内部端口（如 server 容器的 3000 端口）
    port_in_redirect off;
    # 使用相对路径重定向，避免暴露容器内部地址
    absolute_redirect off;
    # 重定向时不使用 server_name，避免泄露内部主机名
    server_name_in_redirect off;

    # 安全响应头（always 标志确保 4xx/5xx 响应也携带）
    # X-Frame-Options：防止点击劫持，禁止被任意第三方 iframe 嵌套
    add_header X-Frame-Options "SAMEORIGIN" always;
    # X-Content-Type-Options：禁止浏览器 MIME 嗅探，避免上传目录被嗅探为可执行类型
    add_header X-Content-Type-Options "nosniff" always;
    # Referrer-Policy：仅向同源请求发送完整 Referrer，跨源仅发送 origin
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # HSTS：强制 HTTPS，max-age 1 年，包含子域名（仅 HTTPS 生效，HTTP 自动忽略）
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP：默认同源，img 允许 data/https，connect 允许 ws/wss（开发与生产 WebSocket）
    # script-src 'self' 严格限制外部脚本，style-src 'unsafe-inline' 兼容 Tailwind 运行时
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss:; font-src 'self' data:; frame-ancestors 'self'" always;

    # 上传请求体大小限制：后端 multer 单文件 5MB、批量最多 5 张
    # Nginx 默认 1MB 会直接返回 413，这里放宽到 30m 覆盖批量上传 + multipart 编码开销
    client_max_body_size 30m;

    # 静态资源根目录
    root /usr/share/nginx/html;
    index index.html;

    # SPA 路由回退：先尝试精确匹配 → 目录 → 目录下 index.html → 最终回退 index.html
    # 添加 $uri/index.html 避免目录路径触发不必要的 301 重定向
    location / {
        try_files $uri $uri/ $uri/index.html /index.html;
    }

    # API 请求反代到后端服务
    location /api/ {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 上传文件反代到后端（express.static 提供 /uploads/ 静态访问）
    # 缺少此配置会导致生产环境图片加载 404
    location /uploads/ {
        proxy_pass http://server:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # 静态资源缓存 7 天，减少回源请求
        expires 7d;
        add_header Cache-Control "public" always;
        # nginx add_header 继承规则：子 location 的 add_header 会覆盖父级
        # 必须在此重复安全响应头，X-Content-Type-Options 防嗅探对上传目录尤其重要
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # WebSocket 反代（聊天实时通讯）
    location /ws {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable" always;
        # nginx add_header 继承规则：子 location 的 add_header 会覆盖父级，需重复安全响应头
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # index.html 显式禁缓存：避免发布新版本后用户仍加载旧 index.html 进而加载已失效的旧 JS hash
    # 设计原因：浏览器对无显式 Cache-Control 的响应会使用启发式缓存，发布后部分用户看到旧版本
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss:; font-src 'self' data:; frame-ancestors 'self'" always;
        expires off;
    }

    # gzip 压缩（与项目工程约定保持一致：gzip_vary + gzip_proxied + gzip_comp_level + gzip_min_length）
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;
}

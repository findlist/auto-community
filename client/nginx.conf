# 前端 Nginx 配置
# 托管 React 静态资源，并将 API 与 WebSocket 请求反代到后端

server {
    listen 80;
    server_name _;

    # 防止重定向时泄露内部端口（如 server 容器的 3000 端口）
    port_in_redirect off;
    # 使用相对路径重定向，避免暴露容器内部地址
    absolute_redirect off;
    # 重定向时不使用 server_name，避免泄露内部主机名
    server_name_in_redirect off;

    # 静态资源根目录
    root /usr/share/nginx/html;
    index index.html;

    # SPA 路由回退：先尝试精确匹配 → 目录 → 目录下 index.html → 最终回退 index.html
    # 添加 $uri/index.html 避免目录路径触发不必要的 301 重定向
    location / {
        try_files $uri $uri/ $uri/index.html /index.html;
    }

    # API 请求反代到后端服务
    location /api/ {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 上传文件反代到后端（express.static 提供 /uploads/ 静态访问）
    # 缺少此配置会导致生产环境图片加载 404
    location /uploads/ {
        proxy_pass http://server:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # 静态资源缓存 7 天，减少回源请求
        expires 7d;
        add_header Cache-Control "public";
    }

    # WebSocket 反代（聊天实时通讯）
    location /ws {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # gzip 压缩（与项目工程约定保持一致：gzip_vary + gzip_proxied + gzip_comp_level + gzip_min_length）
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;
}
